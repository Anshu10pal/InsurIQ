version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: insuriq
      POSTGRES_USER: insuriq_user
      POSTGRES_PASSWORD: root123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://insuriq_user:root123@postgres:5432/insuriq
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
